name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests
        env:
          KUBOC_CORE_SECRET: test-secret-32-chars-long-xxxxxxxxxxxxxxx
          DATABASE_URL: postgresql://test:test@localhost:5432/test_kuboc
        run: pytest tests/ -v --tb=short

      - name: Verify imports
        run: python -c "import kuboc_core; print('kuboc-core', kuboc_core.__version__)"
